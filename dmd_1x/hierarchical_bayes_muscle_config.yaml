# DMD_1X hierarchical Bayes configuration for muscle contrast (EOM vs TA)
# stratified by genotype and compartment.

enabled: true
analysis_id: "instance"

paths:
  input_csv: "/workspaces/mito-counter/data/DMD_1X/results/measurements_cleaned.csv"
  summary_csv: "/workspaces/mito-counter/data/DMD_1X/results/hierarchical_bayes_muscle_statistics.csv"
  trace_dir: "/workspaces/mito-counter/data/DMD_1X/results/bayes_muscle_traces"
  figure_root: "/workspaces/mito-counter/data/DMD_1X/results/figures/bayesian_muscle"

runtime:
  cores: 20
  seed: 20260609
  save_idata: true
  summary_update_mode: "merge"
  visualization_refresh_mode: "never"
  superplot_annotation_mode: "effect_summary"
  retry_on_warnings: false
  retry_max_draws: 10000
  retry_max_tune: 10000
  retry_max_target_accept: 0.999

filters:
  minimum_zoom: 4700.0
  maximum_zoom: 4900.0

available_options:
  positive_likelihoods: ["gamma", "lognormal"]
  bounded_likelihoods: ["beta", "zero_one_inflated_beta", "logitnormal", "logit_skew_normal"]
  summary_update_modes: ["merge", "replace"]
  visualization_refresh_modes: ["never", "refit_first", "rerun_missing_traces"]
  superplot_annotation_modes: ["bayes_factor", "effect_summary"]
  repeat_options: [true, false]

fit_grid:
  muscles:
    - "Wildtype"
    - "Duchenne_Muscular_Dystrophy"
  compartments:
    - "Sub-sarcolemmal (SS)"
    - "Intermyofibrillar (IMF)"
  metrics:
    Area:
      repeat: true
      likelihood: "lognormal"
      draws: 5000
      tune: 7000
      chains: 4
      target_accept: 0.995
    Corrected_area:
      repeat: true
      likelihood: "lognormal"
      draws: 5000
      tune: 7000
      chains: 4
      target_accept: 0.995
    Major_axis_length:
      repeat: true
      likelihood: "lognormal"
      draws: 5000
      tune: 7000
      chains: 4
      target_accept: 0.995
    Minor_axis_length:
      repeat: true
      likelihood: "lognormal"
      draws: 5000
      tune: 7000
      chains: 4
      target_accept: 0.995
    Minimum_Feret_Diameter:
      repeat: true
      likelihood: "lognormal"
      draws: 5000
      tune: 7000
      chains: 4
      target_accept: 0.995
    Elongation:
      repeat: true
      likelihood: "lognormal"
      draws: 5000
      tune: 7000
      chains: 4
      target_accept: 0.995
    Circularity:
      repeat: true
      likelihood: "beta"
      draws: 1500
      tune: 2500
      chains: 4
      target_accept: 0.99
    Solidity:
      repeat: true
      likelihood: "beta"
      draws: 1500
      tune: 2500
      chains: 4
      target_accept: 0.99
    NND:
      repeat: true
      likelihood: "lognormal"
      draws: 5000
      tune: 7000
      chains: 4
      target_accept: 0.995
    3NND:
      repeat: true
      likelihood: "lognormal"
      draws: 5000
      tune: 7000
      chains: 4
      target_accept: 0.995
    5NND:
      repeat: true
      likelihood: "lognormal"
      draws: 5000
      tune: 7000
      chains: 4
      target_accept: 0.995
    Voronoi_Cell_Area:
      repeat: true
      likelihood: "lognormal"
      draws: 5000
      tune: 7000
      chains: 4
      target_accept: 0.995
