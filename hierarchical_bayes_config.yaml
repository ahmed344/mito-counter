    likelihood: "lognormal" # Positive metric option: `gamma` or `lognormal`; lognormal cleared warnings, but this fit still benefits from the strongest sampler settings.
    draws: 1500 # Integer >= 1. Posterior draws per chain for this hardest positive fit.
    tune: 2500 # Integer >= 1. Warmup draws per chain for this hardest positive fit.
    chains: 4 # Integer >= 1. Number of MCMC chains for this fit.
    target_accept: 0.995 # Float in [0.8, 0.999]. Highest target used in the recent successful retries.

  tibialis_anterior_minor_axis_length:
    muscle: "Tibialis Anterior" # Muscle label exactly as it appears in the `Muscle` column.
    metric: "Minor_axis_length" # Metric column name from the measurements table.
