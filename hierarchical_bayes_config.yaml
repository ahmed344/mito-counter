    metric: "NND" # Metric column name from the measurements table.
    repeat: false # Boolean. Set to `true` to recompute this fit, or `false` to keep its existing summary row and trace files untouched.
    likelihood: "lognormal" # Positive metric option: `gamma` or `lognormal`; lognormal substantially improved NND PPC while keeping the same engine status.
    draws: 500 # Integer >= 1. Posterior draws per chain after warmup.
    tune: 500 # Integer >= 1. Warmup draws per chain.
