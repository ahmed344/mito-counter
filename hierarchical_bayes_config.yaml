    likelihood: "gamma" # Positive metric option: `gamma` or `lognormal`; gamma remained slightly stronger and more stable for this metric.
    draws: 1000 # Integer >= 1. Increased posterior draws for fits that previously triggered escalations.
    tune: 1500 # Integer >= 1. Extra warmup for harder geometries.
    chains: 4 # Integer >= 1. Number of MCMC chains for this fit.
    target_accept: 0.99 # Float in [0.8, 0.999]. Higher acceptance to reduce divergences and max-tree-depth pressure.

  tibialis_anterior_minimum_feret_diameter:
    muscle: "Tibialis Anterior" # Muscle label exactly as it appears in the `Muscle` column.
    metric: "Minimum_Feret_Diameter" # Metric column name from the measurements table.
    repeat: false # Boolean. Set to `true` to recompute this fit, or `false` to keep its existing summary row and trace files untouched.
    likelihood: "gamma" # Positive metric option: `gamma` or `lognormal`; gamma stayed clearly superior for this metric in the recent comparison.
    draws: 1000 # Integer >= 1. Increased posterior draws for fits that previously triggered escalations.
    tune: 1500 # Integer >= 1. Extra warmup for harder geometries.
    chains: 4 # Integer >= 1. Number of MCMC chains for this fit.
    target_accept: 0.99 # Float in [0.8, 0.999]. Higher acceptance to reduce divergences and max-tree-depth pressure.

  tibialis_anterior_elongation:
    muscle: "Tibialis Anterior" # Muscle label exactly as it appears in the `Muscle` column.
    metric: "Elongation" # Metric column name from the measurements table.
    repeat: false # Boolean. Set to `true` to recompute this fit, or `false` to keep its existing summary row and trace files untouched.
    likelihood: "lognormal" # Positive metric option: `gamma` or `lognormal`; lognormal improved distribution fit, but the sampler still needs conservative adaptation.
    draws: 1000 # Integer >= 1. Posterior draws per chain for this heavier-tailed positive fit.
