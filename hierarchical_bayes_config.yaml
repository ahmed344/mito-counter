    draws: 500 # Integer >= 1. Posterior draws per chain after warmup.
    tune: 500 # Integer >= 1. Warmup draws per chain.
    chains: 4 # Integer >= 1. Number of MCMC chains for this fit.
    target_accept: 0.95 # Float in [0.8, 0.999]. Higher values are safer for difficult NUTS geometries.

  tibialis_anterior_major_axis_length:
