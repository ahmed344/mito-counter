# Strict DMD instance-level hierarchical Bayes configuration.
# Every fit is listed explicitly so each muscle x compartment x metric can be controlled independently.

enabled: true
analysis_id: "instance"

paths:
  input_csv: "/workspaces/mito-counter/data/DMD/results/measurements_cleaned.csv"
  summary_csv: "/workspaces/mito-counter/data/DMD/results/hierarchical_bayes_statistics.csv"
  trace_dir: "/workspaces/mito-counter/data/DMD/results/bayes_traces"
  figure_root: "/workspaces/mito-counter/data/DMD/results/figures/bayesian"

runtime:
  cores: 8
  seed: 20260607
  save_idata: true
  summary_update_mode: "merge"
  visualization_refresh_mode: "never"
  superplot_annotation_mode: "effect_summary"
  retry_on_warnings: false
  retry_max_draws: 10000
  retry_max_tune: 10000
  retry_max_target_accept: 0.999

filters:
  minimum_zoom: 1200.0
  maximum_zoom: 6900.0

available_options:
  positive_likelihoods: ["gamma", "lognormal"]
  bounded_likelihoods: ["beta", "zero_one_inflated_beta", "logitnormal", "logit_skew_normal"]
  summary_update_modes: ["merge", "replace"]
  visualization_refresh_modes: ["never", "refit_first", "rerun_missing_traces"]
  superplot_annotation_modes: ["bayes_factor", "effect_summary"]
  repeat_options: [true, false]

fits:
  extraocular_muscle__sub_sarcolemmal_ss__area:
    muscle: "Extraocular Muscle"
    compartment: "Sub-sarcolemmal (SS)"
    metric: "Area"
    repeat: true
    likelihood: "lognormal"
    draws: 1500
    tune: 1500
    chains: 4
    target_accept: 0.99
